name: CI

# Standalone CI for the tamandua-ctl mirror. Rust build/test/lint with
# paths relative to the repo root (no working-directory). tamandua-ctl is a
# standalone crate with no path dependency on the rest of the monorepo.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==============================================================================
  # BUILD & TEST - Multi-OS Matrix
  # ==============================================================================
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x86_64
          - os: windows-latest
            artifact-suffix: windows-x86_64
          - os: macos-latest
            artifact-suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (lint)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tamandua-ctl-${{ matrix.artifact-suffix }}
          path: |
            target/release/tamandua-ctl${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 7

  # ==============================================================================
  # APPLE SILICON - Native ARM64 Build
  # ==============================================================================
  macos-arm:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-14  # M1/M2 runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build for Apple Silicon
        run: cargo build --release --target aarch64-apple-darwin

      - name: Run tests on ARM64
        run: cargo test --release --target aarch64-apple-darwin

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tamandua-ctl-macos-aarch64
          path: target/aarch64-apple-darwin/release/tamandua-ctl
          retention-days: 7

  # ==============================================================================
  # SECURITY AUDIT
  # ==============================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
